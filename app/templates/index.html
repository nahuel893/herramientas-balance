<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Column Selector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-item:hover { background-color: #e5e7eb; }
        .table-item.active { background-color: #dbeafe; border-left: 3px solid #3b82f6; }
        .column-item { transition: all 0.15s; }
        .column-item:hover { background-color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <h1 class="text-xl font-semibold text-gray-800">Gold Column Selector</h1>
                <div class="flex items-center gap-4">
                    <select id="savedSelections" class="border rounded px-3 py-2 text-sm">
                        <option value="">Cargar seleccion...</option>
                    </select>
                    <input type="text" id="selectionName" placeholder="Nombre de seleccion" class="border rounded px-3 py-2 text-sm w-48">
                    <button onclick="saveSelection()" class="bg-blue-500 text-white px-4 py-2 rounded text-sm hover:bg-blue-600">
                        Guardar
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="grid grid-cols-12 gap-6">
            <!-- Panel izquierdo: Tablas -->
            <div class="col-span-3 bg-white rounded-lg shadow p-4">
                <h2 class="font-semibold text-gray-700 mb-3">Tablas Gold</h2>
                <div id="tablesList" class="space-y-1 max-h-96 overflow-y-auto">
                    <!-- Se llena dinamicamente -->
                </div>
            </div>

            <!-- Panel central: Columnas disponibles -->
            <div class="col-span-5 bg-white rounded-lg shadow p-4">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="font-semibold text-gray-700">Columnas Disponibles</h2>
                    <span id="tableNameDisplay" class="text-sm text-gray-500"></span>
                </div>
                <div class="mb-3">
                    <button onclick="selectAllColumns()" class="text-xs text-blue-500 hover:underline mr-3">Seleccionar todo</button>
                    <button onclick="deselectAllColumns()" class="text-xs text-red-500 hover:underline">Deseleccionar todo</button>
                </div>
                <div id="columnsList" class="space-y-1 max-h-80 overflow-y-auto">
                    <p class="text-gray-400 text-sm">Selecciona una tabla...</p>
                </div>
            </div>

            <!-- Panel derecho: Columnas seleccionadas -->
            <div class="col-span-4 bg-white rounded-lg shadow p-4">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="font-semibold text-gray-700">Columnas Seleccionadas</h2>
                    <span id="selectedCount" class="text-sm text-gray-500">0 columnas</span>
                </div>
                <div id="selectedColumns" class="space-y-1 max-h-80 overflow-y-auto">
                    <p class="text-gray-400 text-sm">Ninguna columna seleccionada</p>
                </div>
            </div>
        </div>

        <!-- Filtros por columna -->
        <div id="filterSection" class="mt-6 bg-white rounded-lg shadow p-4 hidden">
            <h2 class="font-semibold text-gray-700 mb-3">Filtros</h2>
            <div id="filterControls" class="flex flex-wrap gap-6">
                <!-- Se llena dinamicamente por app.js -->
            </div>
        </div>

        <!-- Filtros y acciones -->
        <div class="mt-6 bg-white rounded-lg shadow p-4">
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <label class="text-sm text-gray-600">Columna fecha:</label>
                    <select id="dateColumn" class="border rounded px-2 py-1 text-sm">
                        <option value="">Sin filtro</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-sm text-gray-600">Desde:</label>
                    <input type="date" id="dateFrom" class="border rounded px-2 py-1 text-sm">
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-sm text-gray-600">Hasta:</label>
                    <input type="date" id="dateTo" class="border rounded px-2 py-1 text-sm">
                </div>
                <div class="flex-1"></div>
                <button onclick="previewData()" class="bg-gray-500 text-white px-4 py-2 rounded text-sm hover:bg-gray-600">
                    Preview (100 filas)
                </button>
                <button onclick="exportData()" class="bg-green-500 text-white px-4 py-2 rounded text-sm hover:bg-green-600">
                    Exportar CSV
                </button>
            </div>
        </div>

        <!-- Aviso de columnas descartadas -->
        <div id="discardedSection" class="mt-6 bg-yellow-50 border border-yellow-300 rounded-lg shadow p-4 hidden">
            <div class="flex items-center justify-between mb-2">
                <h2 class="font-semibold text-yellow-800">Columnas descartadas (1 solo valor unico)</h2>
                <span id="discardedInfo" class="text-sm text-yellow-700"></span>
            </div>
            <p id="discardedList" class="text-sm text-yellow-700"></p>
        </div>

        <!-- Preview de datos -->
        <div id="previewSection" class="mt-6 bg-white rounded-lg shadow p-4 hidden">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-semibold text-gray-700">Preview</h2>
                <span id="previewCount" class="text-sm text-gray-500"></span>
            </div>
            <div class="overflow-x-auto">
                <table id="previewTable" class="min-w-full text-sm">
                    <thead id="previewHead" class="bg-gray-50"></thead>
                    <tbody id="previewBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Mensaje de estado -->
        <div id="statusMessage" class="mt-4 hidden">
            <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded"></div>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
