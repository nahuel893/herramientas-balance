schema: spec-driven

context: |
  Tech stack: Python 3.x, FastAPI 0.135.1, Uvicorn, psycopg2-binary, pandas, Jinja2
  Frontend: HTML + Tailwind CSS (CDN) + Vanilla JS (no build step)
  Database: PostgreSQL — medallion_db, schema silver (100.72.221.10:5432)
  Architecture: 3-layer — routes (main.py) → DB layer (database.py) → PostgreSQL
  Config: dotenv (.env), selections persisted to selections.json, exports/ gitignored
  Testing: none currently
  Style: no linter configured

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules (main.py, database.py, static/app.js, templates/index.html)
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Escape column names with double quotes in SQL
    - CSV exports use sep=';' and encoding='utf-8-sig'
  verify:
    - No automated tests — verify manually via API endpoints or UI
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
